apiVersion: v1
kind: Namespace
metadata:
  name: openclaw
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: openclaw
type: Opaque
stringData:
  # Generate one: openssl rand -hex 24
  OPENCLAW_GATEWAY_TOKEN: "REPLACE_WITH_A_RANDOM_TOKEN"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-state
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
  namespace: openclaw
  labels:
    app: openclaw-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-gateway
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw-gateway
    spec:
      securityContext:
        # image runs as user "node" (uid 1000); ensure the volume is writable
        fsGroup: 1000
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]
          env:
            - name: OPENCLAW_STATE_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
          ports:
            - name: gateway
              containerPort: 18789
            - name: bridge
              containerPort: 18790
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: openclaw-state
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-gateway
  namespace: openclaw
spec:
  type: NodePort
  selector:
    app: openclaw-gateway
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      nodePort: 30789
    - name: bridge
      port: 18790
      targetPort: 18790
