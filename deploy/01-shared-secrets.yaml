# Placeholders — replace the values before/after applying (see README).
#   Shared Anthropic key:  kubectl -n oc-users create secret generic oc-shared-anthropic \
#                            --from-literal=anthropic-key=sk-ant-... --dry-run=client -o yaml | kubectl apply -f -
#   Cookie signing key:    kubectl -n oc-system create secret generic oc-controlplane \
#                            --from-literal=cookie-key=$(openssl rand -hex 32) --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: oc-shared-anthropic
  namespace: oc-users
type: Opaque
stringData:
  anthropic-key: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: oc-controlplane
  namespace: oc-system
type: Opaque
stringData:
  cookie-key: "REPLACE_ME_WITH_RANDOM_HEX"
